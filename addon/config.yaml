name: MCHS Alert Bridge
version: "0.1.0"
slug: mchs_alert_bridge
description: MQTT bridge for Android MCHS Russia notification alerts
url: https://github.com/IceSlam/ha-mchs-alert
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: services
boot: auto
init: false
ports:
  8765/tcp: 8765
ports_description:
  8765/tcp: Android listener HTTP endpoint
options:
  mqtt_host: core-mosquitto
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_discovery: true
  discovery_prefix: homeassistant
  region: "Брянская область"
  regions:
    - "Брянская область"
  filter_by_region: true
  publish_unknown: true
  retain_state: true
  deduplicate_window_seconds: 30
  auto_clear_minutes: 0
  listener_http_port: 8765
  keywords:
    uav:
      - "беспилотная опасность"
      - "бпла"
      - "угроза атаки бпла"
      - "опасность атаки бпла"
    missile:
      - "ракетная опасность"
      - "ракетная угроза"
    air:
      - "воздушная тревога"
      - "авиационная опасность"
    cancel:
      - "отбой"
      - "опасность отменена"
      - "отмена опасности"
      - "отбой беспилотной опасности"
      - "отбой ракетной опасности"
schema:
  mqtt_host: str
  mqtt_port: port
  mqtt_username: str?
  mqtt_password: password?
  mqtt_discovery: bool
  discovery_prefix: str
  region: str
  regions:
    - str
  filter_by_region: bool
  publish_unknown: bool
  retain_state: bool
  deduplicate_window_seconds: int(0,)
  auto_clear_minutes: int(0,)
  listener_http_port: port
  keywords:
    uav:
      - str
    missile:
      - str
    air:
      - str
    cancel:
      - str
