name: Build

on:
  push:
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: addon/bridge/package-lock.json
      - run: npm ci
        working-directory: addon/bridge
      - run: npm run typecheck
        working-directory: addon/bridge
      - run: npm run test
        working-directory: addon/bridge
      - run: npm run build
        working-directory: addon/bridge
      - run: bash addon/provisioning/tests/test_provisioning.sh
      - run: python -m py_compile addon/webui/server.py
      - name: Ensure WebUI does not use self.command
        shell: bash
        run: |
          if grep -R "self.command(" addon/webui/server.py; then
            echo "Do not use self.command because it conflicts with BaseHTTPRequestHandler.command"
            exit 1
          fi
      - name: Ensure Docker API is enabled
        shell: bash
        run: |
          grep -q '^docker_api: true$' addon/config.yaml

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - run: ./gradlew clean assembleDebug
        working-directory: android-listener
      - run: mkdir -p releases addon/provisioning/apks && cp android-listener/app/build/outputs/apk/debug/app-debug.apk releases/mchs-listener.apk && cp releases/mchs-listener.apk addon/provisioning/apks/mchs-listener.apk
      - run: test -f addon/provisioning/apks/mchs-listener.apk
      - uses: actions/upload-artifact@v4
        with:
          name: mchs-listener.apk
          path: releases/mchs-listener.apk

  bundle:
    runs-on: ubuntu-latest
    needs: [bridge, android]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: mchs-listener.apk
          path: /tmp/mchs-listener
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - run: mkdir -p addon/provisioning/apks && cp /tmp/mchs-listener/mchs-listener.apk addon/provisioning/apks/mchs-listener.apk
      - run: test -f repository.yaml && test -f addon/config.yaml && test -f addon/provisioning/apks/mchs-listener.apk
      - run: docker buildx build --load --platform linux/amd64 --build-arg BUILD_FROM=ghcr.io/home-assistant/amd64-base:3.21 -t mchs-alert-amd64-test addon
      - run: docker buildx build --platform linux/arm64 --build-arg BUILD_FROM=ghcr.io/home-assistant/aarch64-base:3.21 -t mchs-alert-aarch64-test addon
      - run: zip -r mchs-ha-addon-bundle.zip repository.yaml addon README.md custom_components .github -x "*/node_modules/*" "*/dist/*" "*/.gradle/*"
      - uses: actions/upload-artifact@v4
        with:
          name: mchs-ha-addon-bundle.zip
          path: mchs-ha-addon-bundle.zip
      - name: Upload release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mchs-ha-addon-bundle.zip
            /tmp/mchs-listener/mchs-listener.apk
