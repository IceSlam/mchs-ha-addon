name: Build

on:
  push:
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/bridge/package-lock.json
      - run: npm ci
        working-directory: server/bridge
      - run: npm run typecheck
        working-directory: server/bridge
      - run: npm run build
        working-directory: server/bridge
      - run: bash -n server/provisioning/provision.sh
      - run: docker compose --env-file server/.env.example -f server/docker-compose.yml config

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - run: ./gradlew clean assembleDebug
        working-directory: android-listener
      - run: mkdir -p releases server/apks/listener && cp android-listener/app/build/outputs/apk/debug/app-debug.apk releases/mchs-listener.apk && cp releases/mchs-listener.apk server/apks/listener/mchs-listener.apk
      - run: test -f server/apks/listener/mchs-listener.apk
      - uses: actions/upload-artifact@v4
        with:
          name: mchs-listener.apk
          path: releases/mchs-listener.apk

  bundle:
    runs-on: ubuntu-latest
    needs: [server, android]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: mchs-listener.apk
          path: /tmp/mchs-listener
      - run: mkdir -p server/apks/listener && cp /tmp/mchs-listener/mchs-listener.apk server/apks/listener/mchs-listener.apk
      - run: test -f server/docker-compose.yml && test -f server/apks/listener/mchs-listener.apk
      - run: docker build -t mchs-alert-server-bridge server/bridge
      - run: zip -r mchs-alert-server-bundle.zip server README.md custom_components android-listener .github -x "*/node_modules/*" "*/dist/*" "*/.gradle/*" "*/build/*"
      - uses: actions/upload-artifact@v4
        with:
          name: mchs-alert-server-bundle.zip
          path: mchs-alert-server-bundle.zip
      - name: Upload release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mchs-alert-server-bundle.zip
            /tmp/mchs-listener/mchs-listener.apk
