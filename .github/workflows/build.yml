name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: addon/bridge/package-lock.json
      - run: npm ci
        working-directory: addon/bridge
      - run: npm run typecheck
        working-directory: addon/bridge
      - run: npm run test
        working-directory: addon/bridge
      - run: npm run build
        working-directory: addon/bridge

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - run: ./gradlew assembleDebug
        working-directory: android-listener
      - run: mkdir -p ../releases && cp app/build/outputs/apk/debug/app-debug.apk ../releases/mchs-alert-listener.apk
        working-directory: android-listener
      - uses: actions/upload-artifact@v4
        with:
          name: mchs-alert-listener.apk
          path: releases/mchs-alert-listener.apk
